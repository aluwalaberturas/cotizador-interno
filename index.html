<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aluwal — Gestión Interna</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2efe9;
  --surf:#ffffff;
  --surf2:#ede9e2;
  --brd:#ddd7ce;
  --brd2:#c8c0b5;
  --txt:#1c1814;
  --txt2:#7a6e60;
  --mut:#b0a290;
  --acc:#8b6420;
  --acc-h:#6e4e18;
  --acc-lt:#fdf3e0;
  --grn:#2e7d50;
  --grn-lt:#e8f5ee;
  --ylw:#b07020;
  --ylw-lt:#fdf4e0;
  --pur:#6b4eb0;
  --pur-lt:#f0eafb;
  --red:#b83030;
  --red-lt:#fce8e8;
  --orn:#b85820;
  --orn-lt:#fdf0e8;
  --sky:#1a6a9a;
  --sky-lt:#e6f3fa;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --gold-glow:0 0 0 2px rgba(139,100,32,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}

/* ── HEADER ── */
header{background:#0f0f0f;border-bottom:1px solid var(--brd);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 1px 0 var(--brd)}
.logo{font-weight:800;font-size:19px;letter-spacing:-.3px;color:var(--txt)}
.logo span{color:var(--acc)}
.logo sub{font-size:8px;font-weight:600;letter-spacing:2.5px;color:var(--mut);text-transform:uppercase;display:block;margin-top:-3px}
.tabs{display:flex;gap:2px;margin-left:auto;background:var(--bg);padding:3px;border-radius:8px;border:1px solid var(--brd)}
.tab{font-weight:600;font-size:12px;padding:6px 16px;border-radius:6px;border:none;background:transparent;color:var(--txt2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;letter-spacing:.2px}
.tab.active{background:var(--surf2);color:var(--acc);border:1px solid var(--brd2);font-weight:700}
.tab svg{width:14px;height:14px}

/* ── LAYOUT ── */
.page{display:none;height:calc(100vh - 56px)}.page.active{display:flex}

/* ── SIDEBAR ── */
.sidebar{width:224px;min-width:200px;background:#0f0f0f;border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
.sidebar-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut);padding:18px 14px 10px}
.cat-list{flex:1;overflow-y:auto;padding:0 8px 16px}
.cat-item{margin-bottom:1px}
.cat-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;background:transparent;border:none;color:var(--txt2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;text-align:left;border-radius:6px;transition:all .15s;letter-spacing:.1px}
.cat-btn:hover{background:var(--surf2);color:var(--txt)}
.cat-btn.sel{background:var(--acc-lt);color:var(--acc);border-left:2px solid var(--acc)}
.cat-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.chev{margin-left:auto;color:var(--mut);font-size:9px;transition:transform .2s}
.cat-btn.open .chev{transform:rotate(90deg)}
.sub-list{display:none;padding:2px 0 4px 26px}
.open~.sub-list{display:block}
.sub-btn{width:100%;display:flex;align-items:center;gap:7px;padding:5px 10px;background:transparent;border:none;color:var(--txt2);font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;text-align:left;border-radius:5px;transition:all .15s}
.sub-btn:hover{background:var(--surf2);color:var(--txt)}
.sub-btn.sel{background:var(--acc-lt);color:var(--acc);font-weight:600}
.colordot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--brd2);flex-shrink:0}

/* ── CONTENT ── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:12px 16px;border-bottom:1px solid var(--brd);background:#0f0f0f;display:flex;gap:8px;align-items:center}
.srch-wrap{position:relative;flex:1}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mut);pointer-events:none}
.srch-ico svg{width:15px;height:15px}
#sB,#sP{width:100%;padding:9px 11px 9px 34px;background:var(--surf2);border:1px solid var(--brd);border-radius:7px;color:var(--txt);font-family:inherit;font-size:13px;outline:none;transition:all .2s}
#sB:focus,#sP:focus{border-color:var(--acc);background:var(--surf);box-shadow:0 0 0 3px rgba(201,169,110,.08)}
#sB::placeholder,#sP::placeholder{color:var(--mut)}
.btn-clr{padding:9px 14px;background:transparent;border:1px solid var(--brd);border-radius:7px;color:var(--txt2);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.2px}
.btn-clr:hover{border-color:var(--brd2);color:var(--txt)}
.info-bar{padding:8px 16px 4px;font-size:11px;color:var(--mut);font-weight:500;letter-spacing:.2px}
.info-bar b{color:var(--acc);font-weight:700}

/* ── GRID ── */
#gB,#gP{flex:1;overflow-y:auto;padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;align-content:start}

/* ── CARD ── */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:14px;transition:all .2s;animation:fi .18s ease;position:relative}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card:hover{border-color:var(--acc);box-shadow:var(--gold-glow);transform:translateY(-1px)}
.card-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.badge{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 7px;border-radius:4px}
.card-name{font-size:13px;font-weight:600;color:var(--txt);line-height:1.35;margin-bottom:3px}
.card-sku{font-size:10px;color:var(--mut);font-weight:500;margin-bottom:10px;letter-spacing:.3px}
.card-sku b{color:var(--acc);font-weight:700}

/* prices list */
.prices{display:flex;flex-direction:column;gap:3px;padding-top:10px;border-top:1px solid var(--brd)}
.pr{border-radius:6px;padding:6px 10px;display:flex;align-items:center;justify-content:space-between}
.pr-lbl{font-size:10px;font-weight:600;letter-spacing:.3px;color:var(--txt2)}
.pr-val{font-size:14px;font-weight:800;letter-spacing:-.2px}

const PRECIOS_CACHE_KEY='aluwal_precios_v1';
const PRECIOS_CACHE_TTL=6*3600*1000; // 6 horas

function applyPrecios(map){
  PRODS.forEach(p=>{
    const pr=map[String(p.sku)];
    if(!pr)return;
    if(pr.ef!==null&&pr.ef!==undefined)p.ef=pr.ef;
    if(pr.p1!==null&&pr.p1!==undefined)p.p1=pr.p1;
    if(pr.c3g!==null&&pr.c3g!==undefined)p.c3g=pr.c3g;
    if(pr.c3!==null&&pr.c3!==undefined)p.c3=pr.c3;
    if(pr.c6!==null&&pr.c6!==undefined)p.c6=pr.c6;
    if(pr.c12!==null&&pr.c12!==undefined)p.c12=pr.c12;
  });
  enrichAll();
}

async function loadPrecios(){
  if(!GAS_URL)return;
  try{
    const cached=localStorage.getItem(PRECIOS_CACHE_KEY);
    if(cached){
      const obj=JSON.parse(cached);
      if(Date.now()-obj.ts<PRECIOS_CACHE_TTL){
        applyPrecios(obj.data);
        console.log('✅ Precios desde caché local');
        return;
      }
    }
    const r=await fetch(GAS_URL+'?action=getPrecios&t='+Date.now(),{redirect:'follow'});
    const d=await r.json();
    if(d.ok&&d.precios){
      applyPrecios(d.precios);
      localStorage.setItem(PRECIOS_CACHE_KEY,JSON.stringify({ts:Date.now(),data:d.precios}));
      console.log('✅ Precios actualizados desde Sheets',d.ts);
    }
  }catch(e){console.warn('⚠️ No se pudo cargar precios desde Sheets',e);}
}

function filtered(sid){
  const q=document.getElementById(sid).value.trim().toLowerCase();
  return PRODS.filter(p=>{
    const mf=!fFilter||fFilter(p);
    const mq=!q||p.sku.toLowerCase().includes(q)||p.nombre.toLowerCase().includes(q)||
      p.color.toLowerCase().includes(q)||p.marca.toLowerCase().includes(q)||p.tipo.toLowerCase().includes(q);
    if(!mf||!mq)return false;
    if(isGrom){
      if(gromFilters.mat&&p.g_mat!==gromFilters.mat)return false;
      if(gromFilters.esp&&p.g_esp!==gromFilters.esp)return false;
      if(gromFilters.med&&p.g_med!==gromFilters.med)return false;
      if(gromFilters.tab&&p.g_tab!==gromFilters.tab)return false;
      if(gromFilters.mar&&p.g_mar!==gromFilters.mar)return false;
    }
    if(isAlum){
      if(alumFilters.width&&p.al_width!==alumFilters.width)return false;
      if(alumFilters.color&&p.color2!==alumFilters.color)return false;
      if(alumFilters.vidrio&&p.al_vidrio!==alumFilters.vidrio)return false;
      if(alumFilters.model&&p.al_model!==alumFilters.model)return false;
    }
    if(isVent){
      if(ventFilters.color&&p.color!==ventFilters.color)return false;
      if(ventFilters.vidrio){if(ventMarca==='Herrero'&&p.vidrio_sub!==ventFilters.vidrio)return false;if(ventMarca==='Modena'&&p.vidrio_tipo!==ventFilters.vidrio)return false;}
      if(ventFilters.extra==='none'&&(p.has_reja||p.has_mosq))return false;
      if(ventFilters.extra==='reja'&&(!p.has_reja||p.has_mosq))return false;
      if(ventFilters.extra==='mosq'&&(p.has_reja||!p.has_mosq))return false;
      if(ventFilters.extra==='rm'&&(!p.has_reja||!p.has_mosq))return false;
    }
    if(isMosq){
      if(mosqFilters.color&&p.color!==mosqFilters.color)return false;
      if(mosqFilters.ancho&&p.mosq_ancho!==mosqFilters.ancho)return false;
      if(mosqFilters.alto&&p.mosq_alto!==mosqFilters.alto)return false;
    }
    return true;
  });
}

const CAT_CLR={'Ventanas':'var(--acc)','Puertas Exterior':'var(--orn)','Puertas Interior':'var(--pur)','Rejas':'var(--grn)','Mosquiteros':'var(--sky)'};

function card(p,q,isP){
  const cc=CAT_CLR[p.cat]||'var(--acc)';
  const nm=hl(p.display_nombre||p.nombre||p.sku,q);
  const sk=hl(p.sku,q);
  const badges=[];
  if(p.tipo)badges.push(`<span class="badge" style="background:${cc}18;color:${cc};border:1px solid ${cc}30">${p.tipo}</span>`);
  if(p.color){const dc=p.color==='Blanco'?'#e2e8f0':'#334155';badges.push(`<span class="badge" style="background:${dc}30;color:var(--txt2);border:1px solid var(--brd)">${p.color}</span>`)}
  const vbadge=p.al_vidrio||p.vidrio;if(vbadge)badges.push(`<span class="badge" style="background:var(--ylw-lt);color:var(--ylw);border:1px solid var(--ylw)30">${vbadge}</span>`);

  const mkRow=k=>`<div class="pr ${P_CLS[k]}"><div class="pr-lbl">${P_SHORT[k]}</div><div class="pr-val">${peso(p[k])}</div></div>`;
  const efRow=p.ef!=null?mkRow('ef'):'';
  const extraRows=P_KEYS.filter(k=>k!=='ef'&&p[k]!=null).map(mkRow).join('');
  const prs=efRow+(extraRows?`<div class="prices-extra">${extraRows}</div><button class="btn-ver-mas" onclick="var x=this.previousElementSibling;x.classList.toggle('open');this.textContent=x.classList.contains('open')?'▲ Ocultar precios':'▼ Ver más precios'">▼ Ver más precios</button>`:'');

  let addBtns='';
  if(isP){
    const pidx=PRODS.indexOf(p);
    const esP=isDoor(p);
    const apSel=esP?(aperturaMap[pidx]||'D'):'';
    const apHTML=esP?`<div class="apertura-sel"><button class="ap-btn ${apSel==='D'?'active':''}" id="apD-${pidx}" onclick="setApertura(${pidx},'D')">◁ Derecha</button><button class="ap-btn ${apSel==='I'?'active':''}" id="apI-${pidx}" onclick="setApertura(${pidx},'I')">▷ Izquierda</button></div>`:'';
    const sizes=getSizes(p);
    const medSel=sizes?(medidaMap[pidx]||sizes[0]):'';
    const medHTML=sizes?`<div class="apertura-sel">${sizes.map(s=>`<button class="ap-btn ${medSel===s?'active':''}" id="ms-${pidx}-${s}" onclick="setMedida(${pidx},'${s}')">${s} cm</button>`).join('')}</div>`:'';
    if(curPago&&p[curPago]!=null){
      addBtns=`<div class="add-btns">${medHTML}${apHTML}<button class="btn-add" onclick="addCartPago(${pidx})"><span>Agregar</span><span>${peso(p[curPago])}</span></button></div>`;
    } else if(curPago){
      addBtns=`<div class="add-btns">${medHTML}${apHTML}<div class="pago-hint">Sin precio en este modo</div></div>`;
    } else {
      addBtns=`<div class="add-btns">${medHTML}${apHTML}<div class="pago-hint">Elegí un medio de pago ↑</div></div>`;
    }
  }

  return`<div class="card">
    <div class="card-badges">${badges.join('')}</div>
    <div class="card-name">${nm}</div>
    <div class="card-sku">SKU: <b>${sk}</b>${p.subcat?' · '+p.subcat:''}</div>
    <div class="prices">${prs}</div>
    ${addBtns}
  </div>`;
}

// ── RENDER ──
function refresh(tab){
  const sid=tab==='B'?'sB':'sP';
  const gid=tab==='B'?'gB':'gP';
  const iid=tab==='B'?'ibB':'ibP';
  const q=document.getElementById(sid).value.trim().toLowerCase();
  const list=filtered(sid);
  const show=list.slice(0,60);
  const g=document.getElementById(gid);
  if(!list.length){
    g.innerHTML='<div class="empty"><div class="empty-ico">🔎</div><h3>Sin resultados</h3><p>Probá con otro término o categoría</p></div>';
  } else {
    g.innerHTML=show.map(p=>card(p,q,tab==='P')).join('');
  }
  const ib=document.getElementById(iid);
  ib.innerHTML=list.length?`Mostrando <b>${show.length}</b> de <b>${list.length}</b> productos`:'';
}

function clrB(){document.getElementById('sB').value='';refresh('B')}
function clrP(){document.getElementById('sP').value='';refresh('P')}

// ── CART ──
function addCartIdx(idx,pk,ap,med){ addCart(PRODS[idx],pk,ap,med); }
function addCart(p,pk,ap,med){
  const aKey=ap||'';const mKey=med||'';
  const ex=cart.find(c=>!c.custom&&c.p.sku===p.sku&&c.pk===pk&&c.apertura===aKey&&c.medida===mKey);
  if(ex)ex.qty++;else cart.push({p,pk,qty:1,apertura:aKey,medida:mKey});
  renderCart();
}
function rmCart(sku,pk,ap,med){const aKey=ap||'';const mKey=med||'';cart=cart.filter(c=>c.custom||!(c.p.sku===sku&&c.pk===pk&&c.apertura===aKey&&c.medida===mKey));renderCart()}
function chgQty(sku,pk,ap,med,d){
  const aKey=ap||'';const mKey=med||'';
  const it=cart.find(c=>!c.custom&&c.p.sku===sku&&c.pk===pk&&c.apertura===aKey&&c.medida===mKey);
  if(!it)return;it.qty+=d;
  if(it.qty<=0)rmCart(sku,pk,aKey,mKey);else renderCart();
}
function clrCart(){cart=[];renderCart()}
let _custId=0;
function rmCartCustom(id){cart=cart.filter(c=>!(c.custom&&c.id===id));renderCart();}
function chgQtyCustom(id,d){const it=cart.find(c=>c.custom&&c.id===id);if(!it)return;it.qty+=d;if(it.qty<=0)rmCartCustom(id);else renderCart();}

let _manualType='';
function openManual(type){
  _manualType=type;
  const isEnvio=type==='envio';
  document.getElementById('manualTitle').textContent=isEnvio?'Agregar Envío':'Agregar Adicional / Accesorio';
  const nw=document.getElementById('manualNombreWrap');
  nw.style.display=isEnvio?'none':'block';
  document.getElementById('manualNombre').value=isEnvio?'Envío':'';
  document.getElementById('manualQty').value='1';
  document.getElementById('manualPrecio').value='';
  document.getElementById('manualMbg').classList.add('open');
  setTimeout(()=>document.getElementById(isEnvio?'manualPrecio':'manualNombre').focus(),120);
}
function closeManual(){document.getElementById('manualMbg').classList.remove('open');}
function addManualItem(){
  const label=document.getElementById('manualNombre').value.trim()||(_manualType==='envio'?'Envío':'Adicional');
  const qty=Math.max(1,parseInt(document.getElementById('manualQty').value)||1);
  const precioUnit=parseFloat(String(document.getElementById('manualPrecio').value).replace(/\./g,'').replace(',','.'))||0;
  if(!precioUnit){document.getElementById('manualPrecio').focus();return;}
  cart.push({custom:true,id:++_custId,label,tipo:_manualType,ancho:0,alto:0,color:'',vidrio:'',qty,precioUnit,pk:curPago||'ef'});
  renderCart();
  closeManual();
}

function renderCart(){
  const cnt=cart.reduce((s,c)=>s+c.qty,0);
  document.getElementById('cN').textContent=cnt;
  const tot=cart.reduce((s,c)=>s+(c.custom?c.precioUnit:(c.p[c.pk]||0))*c.qty,0);
  document.getElementById('cTotal').textContent=peso(tot);
  document.getElementById('btnGen').disabled=cart.length===0;
  const hasMedida=cart.some(c=>c.custom&&c.tipo!=='envio'&&c.tipo!=='adicional');
  document.querySelectorAll('.pago-chip').forEach(el=>{
    const blocked=hasMedida&&el.dataset.pago!=='ef';
    el.disabled=blocked;
    el.style.opacity=blocked?'0.3':'';
    el.style.pointerEvents=blocked?'none':'';
    el.title=blocked?'No disponible con ítems a medida':'';
  });
  const cb=document.getElementById('cBody');
  if(!cart.length){cb.innerHTML='<div class="cart-empty">Seleccioná productos<br>para armar el presupuesto</div>';return}
  cb.innerHTML=cart.map(it=>{
    if(it.custom){
      return`<div class="ci">
        <div class="ci-name">${it.label}</div>
        <div class="ci-meta">${it.ancho}×${it.alto}mm · ${it.color}</div>
        <span class="ci-price-chip" style="background:#111;color:#fff">MEDIDA</span>
        <div class="ci-row">
          <div class="qty-wrap">
            <button class="qb" onclick="chgQtyCustom(${it.id},-1)">−</button>
            <span class="qv">${it.qty}</span>
            <button class="qb" onclick="chgQtyCustom(${it.id},1)">+</button>
          </div>
          <span class="ci-sub">${peso(it.precioUnit*it.qty)}</span>
          <button class="ci-del" onclick="rmCartCustom(${it.id})">✕</button>
        </div>
      </div>`;
    }
    const chip=`<span class="ci-price-chip" style="${CHIP[it.pk]}">${P_SHORT[it.pk]}</span>`;
    const apLabel=it.apertura?`<span style="font-size:10px;color:var(--acc);font-weight:600"> · Ap. ${it.apertura==='D'?'Derecha':'Izquierda'}</span>`:'';
    const medLabel=it.medida?`<span style="font-size:10px;color:var(--acc);font-weight:600"> · ${it.medida}cm</span>`:'';
    const apKey=it.apertura||'';const mKey=it.medida||'';
    return`<div class="ci">
      <div class="ci-name">${it.p.display_nombre||it.p.nombre||it.p.sku}${medLabel}${apLabel}</div>
      <div class="ci-meta">SKU: ${it.p.sku}</div>
      ${chip}
      <div class="ci-row">
        <div class="qty-wrap">
          <button class="qb" onclick="chgQty('${it.p.sku}','${it.pk}','${apKey}','${mKey}',-1)">−</button>
          <span class="qv">${it.qty}</span>
          <button class="qb" onclick="chgQty('${it.p.sku}','${it.pk}','${apKey}','${mKey}',1)">+</button>
        </div>
        <span class="ci-sub">${peso((it.p[it.pk]||0)*it.qty)}</span>
        <button class="ci-del" onclick="rmCart('${it.p.sku}','${it.pk}','${apKey}','${mKey}')">✕</button>
      </div>
    </div>`
  }).join('');
}

function setPago(pk){
  curPago=pk;
  cart.forEach(it=>it.pk=pk);
  document.querySelectorAll('.pago-chip').forEach(el=>{
    el.classList.remove('active');
    el.style.opacity='';
    el.style.pointerEvents='';
    if(el.dataset.pago===pk)el.classList.add('active');
  });
  const lbl=document.getElementById('pagoMode');
  if(lbl)lbl.textContent=P_LABELS[pk]||'';
  refresh('P');renderCart();
}
function addCartPago(idx){if(!curPago)return;const p=PRODS[idx];const ap=isDoor(p)?(aperturaMap[idx]||'D'):null;const sizes=getSizes(p);const med=sizes?(medidaMap[idx]||sizes[0]):'';addCartIdx(idx,curPago,ap,med);}

  const req=['fName','fTel','fDir','fLoc'];

function doWhatsApp(name,tel,ord,mode,tot){
  const telClean=(tel||'').replace(/\D/g,'');
  const items=cart.map(c=>`• ${buildItemLabel(c)} x${c.qty} — ${peso(c.custom?c.precioUnit:(c.p[mode]??0))}`).join('\n');
  const msg=
`Hola ${name}! 👋 Te paso el presupuesto *${ord}* de *Aluwal Aberturas*:

${items}

*Total (${P_SHORT[mode]||'Efectivo'}): ${peso(tot)}*

Válido por 7 días. Ante cualquier consulta estamos a tu disposición! 🪟`;
  window.open(`https://wa.me/549${telClean}?text=${encodeURIComponent(msg)}`,'_blank');
}

// ── TABS ──
const TAB_IDS=['B','P','C'];
function goTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===TAB_IDS.indexOf(t)));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page'+t).classList.add('active');
  fFilter=null;
  if(t==='C'){
    const fr=document.getElementById('cotizadorFrame');
    if(!fr.src)fr.src='https://aluwalaberturas.com/cotizador-para-web/';
  }
}
